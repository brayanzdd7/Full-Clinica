<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicamentos — Clínica Médica</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="auth.js"></script>
<script src="validaciones.js"></script>
<style>
  :root{--teal:#0fa8a0;--teal-dark:#0a7a75;--teal-glow:rgba(15,168,160,0.2);--bg:#080f14;--surface:#0e1a22;--surface2:#152130;--surface3:#1c2e3e;--border:rgba(15,168,160,0.15);--border2:rgba(255,255,255,0.06);--text:#e8f4f3;--muted:#6a9a96;--sidebar-w:240px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow:hidden;}
  .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;}
  .sidebar-logo{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .logo-box{width:36px;height:36px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 15px var(--teal-glow);flex-shrink:0;}
  .logo-text{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;line-height:1.2;}
  .logo-text small{display:block;font-size:0.65rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;}
  .nav-section{padding:1rem 0.75rem 0.5rem;}
  .nav-label{font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 0.75rem;margin-bottom:0.4rem;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:0.65rem 0.75rem;border-radius:10px;cursor:pointer;transition:all 0.2s;font-size:0.88rem;color:var(--muted);text-decoration:none;margin-bottom:2px;}
  .nav-item:hover{background:var(--surface2);color:var(--text);}
  .nav-item.active{background:rgba(15,168,160,0.15);color:var(--teal);}
  .nav-item svg{width:18px;height:18px;flex-shrink:0;}
  .sidebar-footer{margin-top:auto;padding:1rem;border-top:1px solid var(--border);}
  .user-card{display:flex;align-items:center;gap:10px;padding:0.6rem;border-radius:10px;background:var(--surface2);}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-dark));display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:600;flex-shrink:0;}
  .user-info{flex:1;min-width:0;}
  .user-name{font-size:0.85rem;font-weight:500;}
  .user-role{font-size:0.7rem;color:var(--teal);}
  .btn-logout{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px;transition:all 0.2s;}
  .btn-logout:hover{color:#f87171;background:rgba(248,113,113,0.1);}
  .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  .topbar{padding:1.2rem 2rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;z-index:50;}
  .page-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;}
  .btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;border:none;padding:0.6rem 1.2rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;cursor:pointer;transition:all 0.2s;box-shadow:0 3px 12px var(--teal-glow);}
  .btn-primary:hover{transform:translateY(-2px);}
  .content{padding:2rem;flex:1;overflow-y:auto;}

  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
  .stat-mini{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:1.2rem;display:flex;align-items:center;gap:12px;}
  .stat-mini-icon{font-size:1.5rem;}
  .stat-mini-label{font-size:0.72rem;color:var(--muted);}
  .stat-mini-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;}

  .filters{display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .search-input,.filter-select{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:0.55rem 0.9rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
  .search-input:focus,.filter-select:focus{border-color:var(--teal);}
  .search-input{min-width:250px;}
  .filter-select option{background:var(--surface2);}

  .panel{background:var(--surface);border:1px solid var(--border2);border-radius:16px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  th{font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:left;padding:0.75rem 1rem;border-bottom:1px solid var(--border2);background:rgba(255,255,255,0.02);}
  td{padding:0.85rem 1rem;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.85rem;}
  tr:last-child td{border:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .badge{padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:500;display:inline-block;}
  .badge-green{background:rgba(52,211,153,0.15);color:#34d399;}
  .badge-yellow{background:rgba(245,158,11,0.15);color:#f59e0b;}
  .badge-red{background:rgba(248,113,113,0.15);color:#f87171;}

  .stock-bar{height:5px;background:var(--surface3);border-radius:3px;margin-top:4px;width:80px;}
  .stock-fill{height:100%;border-radius:3px;transition:width 0.5s;}

  .action-btn{background:none;border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:0.75rem;transition:all 0.2s;margin-right:4px;}
  .action-btn:hover{border-color:var(--teal);color:var(--teal);}
  .action-btn.danger:hover{border-color:#f87171;color:#f87171;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;}
  .overlay.show{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;width:100%;max-width:500px;position:relative;animation:modalIn 0.3s cubic-bezier(0.16,1,0.3,1);}
  @keyframes modalIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
  .modal-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:1.5rem;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .form-field{display:flex;flex-direction:column;gap:6px;}
  .form-field.full{grid-column:1/-1;}
  .form-field label{font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
  .form-field input,.form-field select,.form-field textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.7rem 0.9rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
  .form-field input:focus,.form-field select:focus{border-color:var(--teal);}
  .form-field select option{background:var(--surface2);}
  .modal-actions{display:flex;justify-content:flex-end;gap:0.75rem;margin-top:1.5rem;}
  .btn-cancel{background:none;border:1px solid var(--border2);color:var(--muted);padding:0.6rem 1.2rem;border-radius:10px;cursor:pointer;font-size:0.88rem;}
  .btn-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;}
  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:1px solid var(--teal);color:var(--text);padding:0.8rem 1.2rem;border-radius:12px;font-size:0.85rem;z-index:999;box-shadow:0 4px 20px var(--teal-glow);}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="topbar">
    <div class="page-title">Inventario de Medicamentos</div>
    <button class="btn-primary" onclick="openModal()">+ Agregar Medicamento</button>
  </div>
  <div class="content">
    <div class="stats-row">
      <div class="stat-mini"><div class="stat-mini-icon">💊</div><div><div class="stat-mini-label">Total Medicamentos</div><div class="stat-mini-val" id="stTotal">—</div></div></div>
      <div class="stat-mini"><div class="stat-mini-icon">⚠️</div><div><div class="stat-mini-label">Stock Bajo (&lt;10)</div><div class="stat-mini-val" id="stBajo" style="color:#f59e0b">—</div></div></div>
      <div class="stat-mini"><div class="stat-mini-icon">🚨</div><div><div class="stat-mini-label">Sin Stock</div><div class="stat-mini-val" id="stCero" style="color:#f87171">—</div></div></div>
    </div>

    <div class="filters">
      <input class="search-input" type="text" placeholder="🔍  Buscar medicamento..." oninput="filtrar()">
      <select class="filter-select" onchange="filtrar()" id="filterStock">
        <option value="">Todo el stock</option>
        <option value="bajo">Stock bajo</option>
        <option value="normal">Stock normal</option>
        <option value="sin">Sin stock</option>
      </select>
    </div>

    <div class="panel">
      <table>
        <thead><tr><th>Medicamento</th><th>Presentación</th><th>Stock</th><th>Precio</th><th>Vencimiento</th><th>Proveedor</th><th>Acciones</th></tr></thead>
        <tbody id="tableMeds"><tr><td colspan="7" style="text-align:center;color:var(--muted);padding:3rem">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="btn-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">Nuevo Medicamento</div>
    <input type="hidden" id="editId">
    <div class="form-grid">
      <div class="form-field full"><label>Nombre del Medicamento</label><input type="text" id="inpNombre" placeholder="Ej: Amoxicilina 500mg"></div>
      <div class="form-field full"><label>Descripción</label><textarea id="inpDesc" rows="2" placeholder="Uso y descripción..."></textarea></div>
      <div class="form-field"><label>Presentación</label><select id="inpPres"><option>Tableta</option><option>Cápsula</option><option>Jarabe</option><option>Inyección</option><option>Crema</option><option>Gotas</option><option>Parche</option></select></div>
      <div class="form-field"><label>Stock</label><input type="number" id="inpStock" min="0" value="0"></div>
      <div class="form-field"><label>Precio Unitario (Q)</label><input type="number" id="inpPrecio" step="0.01" min="0"></div>
      <div class="form-field"><label>Fecha de Vencimiento</label><input type="date" id="inpVenc"></div>
      <div class="form-field full"><label>Proveedor</label><input type="text" id="inpProv"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<script>
AUTH.guard(['Administrador','Doctor']);
AUTH.initSidebar('medicamentos.html');
const API='http://localhost:5190/api';
const headers=AUTH.headers();
// Ocultar botón agregar si es doctor (solo puede consultar)
document.addEventListener('DOMContentLoaded',()=>{
  if(!AUTH.esAdmin()){
    const btn=document.querySelector('.btn-primary');
    if(btn) btn.style.display='none';
  }
});

let allMeds=[];

async function load(){
  allMeds=await fetch(`${API}/medicamentos`,{headers}).then(r=>r.json());
  document.getElementById('stTotal').textContent=allMeds.length;
  document.getElementById('stBajo').textContent=allMeds.filter(m=>m.stock>0&&m.stock<10).length;
  document.getElementById('stCero').textContent=allMeds.filter(m=>m.stock===0).length;
  render(allMeds);
}

function render(list){
  const tb=document.getElementById('tableMeds');
  if(!list.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:3rem">Sin medicamentos</td></tr>';return;}
  tb.innerHTML=list.map(m=>{
    const pct=Math.min(100,Math.max(0,(m.stock/100)*100));
    const color=m.stock===0?'#f87171':m.stock<10?'#f59e0b':'#34d399';
    const badge=m.stock===0?'badge-red':m.stock<10?'badge-yellow':'badge-green';
    const venc=m.fechaVencimiento?new Date(m.fechaVencimiento):null;
    const vencStr=venc?venc.toLocaleDateString('es-GT'):'—';
    const isExpired=venc&&venc<new Date();
    return `<tr>
      <td><div style="font-weight:500">${m.nombre}</div><div style="font-size:0.72rem;color:var(--muted)">${m.descripcion||''}</div></td>
      <td>${m.presentacion||'—'}</td>
      <td>
        <span class="badge ${badge}">${m.stock}</span>
        <div class="stock-bar"><div class="stock-fill" style="width:${pct}%;background:${color}"></div></div>
      </td>
      <td>Q ${m.precioUnitario?.toFixed(2)||'0.00'}</td>
      <td style="color:${isExpired?'#f87171':'inherit'}">${vencStr}${isExpired?' ⚠':''}</td>
      <td style="font-size:0.78rem;color:var(--muted)">${m.proveedor||'—'}</td>
      <td>
        <button class="action-btn" onclick="editMed(${m.medicamentoId})">✏</button>
        <button class="action-btn danger" onclick="deleteMed(${m.medicamentoId})">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

function filtrar(){
  const q=document.querySelector('.search-input').value.toLowerCase();
  const f=document.getElementById('filterStock').value;
  render(allMeds.filter(m=>{
    const match=m.nombre.toLowerCase().includes(q);
    if(f==='bajo') return match&&m.stock>0&&m.stock<10;
    if(f==='sin') return match&&m.stock===0;
    if(f==='normal') return match&&m.stock>=10;
    return match;
  }));
}

function openModal(){ document.getElementById('editId').value=''; document.getElementById('modalTitle').textContent='Nuevo Medicamento'; document.getElementById('overlay').classList.add('show'); }
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }

function editMed(id){
  const m=allMeds.find(x=>x.medicamentoId===id);
  if(!m) return;
  document.getElementById('editId').value=id;
  document.getElementById('modalTitle').textContent='Editar Medicamento';
  document.getElementById('inpNombre').value=m.nombre;
  document.getElementById('inpDesc').value=m.descripcion||'';
  document.getElementById('inpPres').value=m.presentacion||'Tableta';
  document.getElementById('inpStock').value=m.stock;
  document.getElementById('inpPrecio').value=m.precioUnitario;
  document.getElementById('inpVenc').value=m.fechaVencimiento?m.fechaVencimiento.split('T')[0]:'';
  document.getElementById('inpProv').value=m.proveedor||'';
  document.getElementById('overlay').classList.add('show');
}

async function guardar(){
  const id=document.getElementById('editId').value;
  const body={
    nombre:document.getElementById('inpNombre').value,
    descripcion:document.getElementById('inpDesc').value,
    presentacion:document.getElementById('inpPres').value,
    stock:parseInt(document.getElementById('inpStock').value),
    precioUnitario:parseFloat(document.getElementById('inpPrecio').value)||0,
    fechaVencimiento:document.getElementById('inpVenc').value||null,
    proveedor:document.getElementById('inpProv').value,
  };
  const url=id?`${API}/medicamentos/${id}`:`${API}/medicamentos`;
  const method=id?'PUT':'POST';
  const res=await fetch(url,{method,headers,body:JSON.stringify(body)});
  if(res.ok){ toast(id?'Medicamento actualizado ✓':'Medicamento agregado ✓'); closeModal(); load(); }
  else toast('Error al guardar',true);
}

async function deleteMed(id){
  if(!confirm('¿Eliminar este medicamento?')) return;
  await fetch(`${API}/medicamentos/${id}`,{method:'DELETE',headers});
  toast('Medicamento eliminado');
  load();
}

function toast(msg,err=false){
  const t=document.createElement('div');t.className='toast';t.style.borderColor=err?'#f87171':'var(--teal)';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}
function logout(){ AUTH.logout(); }
load();
</script>
</body>
</html>
